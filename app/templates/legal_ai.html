{% extends "base.html" %}
{% block content %}

<section class="legal-ai">

    <div class="sidebar">
        <div class="logo">ClauseIQ</div>
        <div class="history" id="history"></div>
    </div>

    <div class="main">

        <div class="header">
            <h1>Legal Assistant</h1>
        </div>

        <div class="chat-card">

            <div class="chat-box" id="chatMessages"></div>

            <div class="typing" id="typing">
                <span></span><span></span><span></span>
            </div>

            <div class="upload-progress" id="uploadProgress"></div>

            <div class="input-area" id="dropZone">
                <textarea id="query" placeholder="Ask your legal question..."></textarea>

                <div class="actions">
                    <div class="icon-btn" onclick="uploadFile()">📎</div>
                    <div class="icon-btn send" onclick="sendMessage()">➤</div>
                </div>

                <input type="file" id="fileUpload" hidden>
            </div>

        </div>

    </div>

</section>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #020617;
    color: #e2e8f0;
}

.legal-ai {
    display: flex;
    height: calc(100vh - 70px);
    margin-top: 70px;
    overflow: hidden;
}

.sidebar {
    width: 240px;
    min-width: 240px;
    background: #020617;
    border-right: 1px solid #1e293b;
    padding: 20px;
    overflow-y: auto;
}

.logo {
    font-weight: 700;
    margin-bottom: 20px;
}

.history div {
    margin-bottom: 10px;
    cursor: pointer;
    padding: 6px;
    border-radius: 6px;
}

.history div:hover {
    background: #1e293b;
}

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.header {
    padding: 15px;
    border-bottom: 1px solid #1e293b;
    background: rgba(2,6,23,0.8);
}

.chat-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.ai-msg, .user-msg {
    display: flex;
    margin-bottom: 14px;
    max-width: 70%;
}

.user-msg {
    margin-left: auto;
    flex-direction: row-reverse;
}

.avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #1e293b;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
}

.user-msg .avatar {
    background: #2563eb;
    color: white;
}

.bubble {
    padding: 10px;
    background: #1e293b;
    border-radius: 10px;
    margin: 0 8px;
    font-size: 14px;
}

.user-msg .bubble {
    background: #2563eb;
}

.time {
    font-size: 10px;
    color: #64748b;
    margin-top: 3px;
}

.input-area {
    padding: 10px;
    border-top: 1px solid #1e293b;
    position: relative;
    background: #020617;
}

textarea {
    width: 100%;
    height: 60px;
    background: #020617;
    border: 1px solid #1e293b;
    color: white;
    border-radius: 8px;
    padding: 10px;
}

textarea:focus {
    outline: none;
    border-color: #2563eb;
}

.actions {
    position: absolute;
    right: 15px;
    bottom: 15px;
    display: flex;
    gap: 10px;
}

.icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #1e293b;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
}

.icon-btn:hover {
    background: #334155;
}

.send {
    background: #2563eb;
    color: white;
}

.typing {
    display: none;
    padding: 10px;
    gap: 5px;
}

.typing span {
    width: 6px;
    height: 6px;
    background: #94a3b8;
    border-radius: 50%;
    display: inline-block;
    animation: blink 1.4s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
}

.upload-progress {
    height: 3px;
    background: #2563eb;
    width: 0%;
}

@media (max-width: 768px) {
    .sidebar {
        display: none;
    }

    .legal-ai {
        height: calc(100vh - 60px);
        margin-top: 60px;
    }
}
</style>

<script>
const chat = document.getElementById("chatMessages");
const typing = document.getElementById("typing");
const progress = document.getElementById("uploadProgress");
const historyBox = document.getElementById("history");

function time() {
    return new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = type + "-msg";

    div.innerHTML = `
        <div class="avatar">${type==="ai"?"AI":"You"}</div>
        <div>
            <div class="bubble">${text}</div>
            <div class="time">${time()}</div>
        </div>
    `;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    if(type==="user"){
        const h = document.createElement("div");
        h.innerText = text.substring(0,30);
        historyBox.appendChild(h);
    }
}

function sendMessage() {
    const input = document.getElementById("query");
    const msg = input.value.trim();
    if (!msg) return;

    addMessage(msg,"user");
    input.value="";
    typing.style.display="flex";

    fetch("/ask",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({query:msg})
    })
    .then(res=>res.json())
    .then(data=>{
        typing.style.display="none";
        addMessage(data.answer,"ai");
    })
    .catch(()=>{
        typing.style.display="none";
        addMessage("Error","ai");
    });
}

function uploadFile(){
    document.getElementById("fileUpload").click();
}

document.getElementById("fileUpload").addEventListener("change", function(){
    const file=this.files[0];
    if(!file)return;

    const formData=new FormData();
    formData.append("file",file);

    let percent=0;
    const interval=setInterval(()=>{
        percent+=10;
        progress.style.width=percent+"%";
        if(percent>=100) clearInterval(interval);
    },100);

    fetch("/upload",{method:"POST",body:formData})
    .then(()=>{
        progress.style.width="0%";
        addMessage("File uploaded","ai");
    })
    .catch(()=>addMessage("Upload failed","ai"));
});

const dropZone=document.getElementById("dropZone");

dropZone.addEventListener("dragover", e=>{
    e.preventDefault();
    dropZone.style.border="1px dashed #2563eb";
});

dropZone.addEventListener("dragleave", ()=>{
    dropZone.style.border="none";
});

dropZone.addEventListener("drop", e=>{
    e.preventDefault();
    const file=e.dataTransfer.files[0];
    if(!file)return;

    const formData=new FormData();
    formData.append("file",file);

    fetch("/upload",{method:"POST",body:formData})
    .then(()=>addMessage("File uploaded","ai"));
});

document.getElementById("query").addEventListener("keydown", function(e){
    if(e.key==="Enter"&&!e.shiftKey){
        e.preventDefault();
        sendMessage();
    }
});
</script>

{% endblock %}
